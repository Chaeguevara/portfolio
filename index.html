  <!-- SPA GitHub Pages path-restoration: must run before the main script.
       Decodes the ?p=/works/3 query that 404.html injected, restoring the
       original URL via replaceState so the SPA router sees the right path. -->
  <script>
    (function (l) {
      if (l.search.indexOf('?p=') === 0 || l.search.indexOf('&p=') !== -1) {
        var q = {};
        l.search.slice(1).split('&').forEach(function (pair) {
          var idx = pair.indexOf('=');
          if (idx > 0) q[pair.slice(0, idx)] = pair.slice(idx + 1).replace(/~and~/g, '&');
        });
        if (q.p !== undefined) {
          var newUrl = l.pathname.replace(/\/$/, '') + (q.p || '/') +
            (q.q ? '?' + q.q : '') + l.hash;
          window.history.replaceState(null, '', newUrl);
        }
      }
    }(window.location));
  </script>
