<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Heejin Chae — Portfolio</title>
<script>
  // Single Page Apps for GitHub Pages
  // https://github.com/rafgraph/spa-github-pages — MIT, copied inline.
  // Captures the requested path, encodes it into a query string, and
  // redirects to /portfolio/. index.html then decodes it back into the URL
  // before the SPA router boots.
  (function () {
    var pathSegmentsToKeep = 1; // "/portfolio" — keep one segment
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  }());
</script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
