  <title>Foldable crease pattern</title>
  <desc>origamisimulator convention: stroke #ff0000=mountain, #0000ff=valley, #000000=border, #00ff00=cut, #ffff00=facet; line opacity = fold angle (1.0=180deg, 0.5=90deg). Scale: 1 unit = 1 mm. Laser: layer "cut" = cut-through, layer "score" = fold/score. Flat-foldable: yes (Maekawa+Kawasaki hold at all 10 interior vertices).</desc>
